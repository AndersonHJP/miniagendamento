name: Java CI/CD

on:
  push:
    branches:
      - develop
      - homolog
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install

  deploy-homolog:
    if: github.ref == 'refs/heads/homolog'
    runs-on: ubuntu-latest
    needs: build
    environment: homolog

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Homolog
        run: echo "Fazendo deploy para ambiente de homolog"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Produção
        run: echo "Fazendo deploy para produção"
